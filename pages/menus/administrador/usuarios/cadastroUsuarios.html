<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Usuário - Administrador</title>
  <link rel="icon" href="../../../../img/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../../../../css/menuAdministrador.css">
  <link rel="stylesheet" href="../../../../css/administrador/usuarios.css">
</head>
<body>
  <!-- MENU LATERAL -->
  <aside class="menuLateral">
    <div class="logoContainer">
      <img src="../../../../img/icons8-duas-mãos-windows-11-filled/Logo.png" alt="Logo: Duas Mãos abertas">
      <div class="textoBranding">
        <div class="nomeBrand">SAADI</div>
        <div class="nivelAcesso">Nível: Administrador</div>
      </div>
    </div>

    <div class="Perfil">
      <div class="nomePerfil">Usuário Logado</div>
      <div class="emailPerfil">usuario@escola.edu.br</div>
    </div>

                <div class="botoesLaterais">
      <button class="btnLateral" onclick="navegarPara('../menuAdministrador.html')" aria-label="Voltar ao Painel Principal">
        <img src="/img/icon-lista.png" alt="">
        <span>Painel Principal</span>
      </button>
      <button class="btnLateral" onclick="navegarPara('../unidades/listarUnidades.html')" aria-label="Gerenciar Unidades Escolares">
        <img src="/img/icon-cadastro.png" alt="">
        <span>Unidades Escolares</span>
      </button>
      <button class="btnLateral ativo" onclick="navegarPara('../usuarios/listarUsuarios.html')" aria-label="Gerenciar Usuários do Sistema">
        <img src="/img/perfil.png" alt="">
        <span>Usuários do Sistema</span>
      </button>
      <button class="btnLateral" onclick="navegarPara('../relatoriosAdministrador.html')" aria-label="Ver Relatórios Consolidados">
        <img src="/img/icon-lista.png" alt="">
        <span>Relatórios</span>
      </button>
      <button class="btnLateral" onclick="navegarPara('../auditoria.html')" aria-label="Consultar Auditoria e Histórico">
        <img src="/img/icon-lista.png" alt="">
        <span>Auditoria</span>
      </button>
      <button class="btnLateral" onclick="navegarPara('../parametros.html')" aria-label="Gerenciar Parâmetros do Sistema">
        <img src="/img/engrenagem.png" alt="">
        <span>Parâmetros</span>
      </button>
      <button class="btnLateral" onclick="navegarPara('../alunos/listarAlunos.html')" aria-label="Acessar Gestão Central de Alunos">
        <img src="/img/icon-lista.png" alt="">
        <span>Alunos - Nível Central</span>
      </button>
    </div>

    <div class="sair">
      <button class="btnSair" onclick="logout()" aria-label="Fazer logout do sistema">
        <img src="/img/sair.png" alt="">
        <span>Sair da Conta</span>
      </button>
    </div>
  </aside>

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="conteudoPrincipal">
    <!-- CABEÇALHO -->
    <section class="cabecalhoDashboard">
      <h1>Cadastrar Novo Usuário</h1>
      <p>Preencha os dados para registrar um novo usuário no sistema</p>
    </section>

    <!-- FORMULÁRIO DE CADASTRO -->
    <section class="containerPrincipal">
      <form class="formulario" onsubmit="salvarUsuario(event)" aria-label="Formulário de cadastro de usuário">
        <!-- SEÇÃO 1: DADOS PESSOAIS -->
        <div style="grid-column: span 2; margin-bottom: 0;">
          <h3 style="color: #1a3a52; font-size: 16px; margin-bottom: 15px;">Dados Pessoais</h3>
        </div>

        <div class="grupoFormulario">
          <label for="nomeCompleto">Nome Completo *</label>
          <input type="text" id="nomeCompleto" name="nomeCompleto" required aria-label="Nome completo do usuário" placeholder="Ex: Maria da Silva Santos">
        </div>

        <div class="grupoFormulario">
          <label for="cpf">CPF *</label>
          <input type="text" id="cpf" name="cpf" required aria-label="CPF do usuário" placeholder="000.000.000-00">
        </div>

        <div class="grupoFormulario">
          <label for="email">Email Institucional *</label>
          <input type="email" id="email" name="email" required aria-label="Email institucional" placeholder="usuario@escola.edu.br">
        </div>

        <div class="grupoFormulario">
          <label for="telefone">Telefone</label>
          <input type="tel" id="telefone" name="telefone" aria-label="Telefone de contato" placeholder="(11) 99999-9999">
        </div>

        <!-- SEÇÃO 2: DADOS DE ACESSO -->
        <div style="grid-column: span 2; margin-top: 25px; margin-bottom: 0;">
          <h3 style="color: #1a3a52; font-size: 16px; margin-bottom: 15px;">Dados de Acesso</h3>
        </div>

        <div class="grupoFormulario">
          <label for="usuario">Usuário/Matrícula *</label>
          <input type="text" id="usuario" name="usuario" required aria-label="Nome de usuário ou matrícula" placeholder="Ex: maria.silva">
        </div>

        <div class="grupoFormulario">
          <label for="senha">Senha Inicial *</label>
          <input type="password" id="senha" name="senha" required aria-label="Senha inicial do usuário" placeholder="Mínimo 8 caracteres">
        </div>

        <div class="grupoFormulario">
          <label for="confirmaSenha">Confirmar Senha *</label>
          <input type="password" id="confirmaSenha" name="confirmaSenha" required aria-label="Confirmação de senha" placeholder="Digite novamente">
        </div>

        <div class="grupoFormulario">
          <label for="perfil">Perfil de Acesso *</label>
          <select id="perfil" name="perfil" required aria-label="Perfil de acesso do usuário">
            <option value="">Selecione...</option>
            <option value="administrador">Administrador</option>
            <option value="secretaria">Secretaria</option>
            <option value="psicopedagogo">Psicopedagogo</option>
            <option value="professor">Professor</option>
            <option value="diretor">Diretor</option>
          </select>
        </div>

        <!-- SEÇÃO 3: VINCULAÇÃO -->
        <div style="grid-column: span 2; margin-top: 25px; margin-bottom: 0;">
          <h3 style="color: #1a3a52; font-size: 16px; margin-bottom: 15px;">Vinculação Organizacional</h3>
        </div>

        <div class="grupoFormulario">
          <label for="unidade">Unidade Escolar *</label>
          <select id="unidade" name="unidade" required aria-label="Unidade escolar" onchange="carregarDiretor()">
            <option value="">Selecione...</option>
            <option value="1">Escola Municipal Centro</option>
            <option value="2">Escola Estadual Norte</option>
            <option value="3">CEI Infantil Leste</option>
            <option value="4">EMEF Sul Integrada</option>
          </select>
        </div>

        <div class="grupoFormulario">
          <label for="departamento">Departamento</label>
          <select id="departamento" name="departamento" aria-label="Departamento">
            <option value="">Selecione...</option>
            <option value="secretaria">Secretaria</option>
            <option value="pedagogico">Pedagógico</option>
            <option value="administrativo">Administrativo</option>
          </select>
        </div>

        <!-- SEÇÃO 4: INFORMAÇÕES ADICIONAIS -->
        <div style="grid-column: span 2; margin-top: 25px; margin-bottom: 0;">
          <h3 style="color: #1a3a52; font-size: 16px; margin-bottom: 15px;">Informações Adicionais</h3>
        </div>

        <div class="grupoFormulario">
          <label for="status">Status *</label>
          <select id="status" name="status" required aria-label="Status do usuário">
            <option value="ativo" selected>Ativo</option>
            <option value="inativo">Inativo</option>
          </select>
        </div>

        <div class="grupoFormulario">
          <label for="dataAdmissao">Data de Admissão</label>
          <input type="date" id="dataAdmissao" name="dataAdmissao" aria-label="Data de admissão">
        </div>

        <div style="grid-column: span 2;">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox" id="enviarEmail" name="enviarEmail" checked aria-label="Enviar email de boas-vindas">
            <span style="color: #2c3e50; font-size: 14px;">Enviar email com dados de acesso ao usuário</span>
          </label>
        </div>

        <!-- BOTÕES -->
        <div class="botoesPrimarios" style="grid-column: span 2;">
          <a href="listarUsuarios.html" class="btn btnSecundario">Cancelar</a>
          <button type="submit" class="btn btnSucesso">Criar Usuário</button>
        </div>
      </form>
    </section>
  </main>

  <!-- VLIBRAS -->
  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
  </script>

  <script>
    function navegarPara(pagina) {
      window.location.href = pagina;
    }

    function logout() {
      if (confirm('Tem certeza que deseja sair do sistema?')) {
        window.location.href = '../../../../pages/auth/login.html';
      }
    }

    function carregarDiretor() {
      // Simula carregamento de diretor da unidade
      console.log('Carregando diretor da unidade selecionada');
    }

    function salvarUsuario(event) {
      event.preventDefault();
      const senha = document.getElementById('senha').value;
      const confirmaSenha = document.getElementById('confirmaSenha').value;

      if (senha !== confirmaSenha) {
        alert('As senhas não coincidem!');
        return;
      }

      if (senha.length < 8) {
        alert('A senha deve ter no mínimo 8 caracteres!');
        return;
      }

      alert('Usuário cadastrado com sucesso!');
      window.location.href = 'listarUsuarios.html';
    }
  </script>
</body>
</html>
