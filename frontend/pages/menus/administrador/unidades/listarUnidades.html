<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listar Unidades Escolares - Administrador</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../../../../css/menuAdministrador.css">
  <link rel="stylesheet" href="../../../../css/administrador/unidades.css">
</head>
<body>
  <!-- MENU LATERAL -->
  <aside class="menuLateral">
    <div class="logoContainer">
      <img src="/img/icons8-duas-mãos-windows-11-filled/Logo.png" alt="Logo: Duas Mãos abertas">
      <div class="textoBranding">
        <div class="nomeBrand">SAADI</div>
        <div class="nivelAcesso">Nível: Administrador</div>
      </div>
    </div>

    <div class="Perfil">
      <div class="nomePerfil"></div>
      <div class="emailPerfil"></div>
    </div>

                <div class="botoesLaterais">
      <button class="btnLateral" onclick="navegarPara('../menuAdministrador.html')" aria-label="Voltar ao Painel Principal">
        <img src="/img/icon-lista.png" alt="">
        <span>Painel Principal</span>
      </button>
      <button class="btnLateral ativo" onclick="navegarPara('../unidades/listarUnidades.html')" aria-label="Gerenciar Unidades Escolares">
        <img src="/img/icon-cadastro.png" alt="">
        <span>Unidades Escolares</span>
      </button>
      <button class="btnLateral" onclick="navegarPara('../usuarios/listarUsuarios.html')" aria-label="Gerenciar Usuários do Sistema">
        <img src="/img/perfil.png" alt="">
        <span>Usuários do Sistema</span>
      </button>
      <button class="btnLateral" onclick="navegarPara('../relatoriosAdministrador.html')" aria-label="Ver Relatórios Consolidados">
        <img src="/img/icon-lista.png" alt="">
        <span>Relatórios</span>
      </button>
      <button class="btnLateral" onclick="navegarPara('../auditoria.html')" aria-label="Consultar Auditoria e Histórico">
        <img src="/img/icon-lista.png" alt="">
        <span>Auditoria</span>
      </button>
      <button class="btnLateral" onclick="navegarPara('../parametros.html')" aria-label="Gerenciar Parâmetros do Sistema">
        <img src="/img/engrenagem.png" alt="">
        <span>Parâmetros</span>
      </button>
      <button class="btnLateral" onclick="navegarPara('../alunos/listarAlunos.html')" aria-label="Acessar Gestão Central de Alunos">
        <img src="/img/icon-lista.png" alt="">
        <span>Alunos - Nível Central</span>
      </button>
    </div>

    <div class="sair">
      <button class="btnSair" onclick="logout()" aria-label="Fazer logout do sistema">
        <img src="/img/sair.png" alt="">
        <span>Sair da Conta</span>
      </button>
    </div>
  </aside>

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="conteudoPrincipal">
    <!-- CABEÇALHO -->
    <section class="cabecalhoDashboard">
      <h1>Unidades Escolares</h1>
      <p>Visualize e gerencie todas as escolas cadastradas no sistema</p>
    </section>

    <!-- BARRA DE BUSCA E FILTROS -->
    <section class="containerPrincipal">
      <div class="barraBuscaUnidades">
        <input 
          type="text" 
          id="campoBusca" 
          placeholder="Buscar por nome, cidade ou CNPJ..." 
          aria-label="Campo de busca de unidades"
          onkeydown="if (event.key === 'Enter') buscarUnidades()"
        >
        <button class="btn btnSecundario" onclick="buscarUnidades()" aria-label="Buscar unidades">Buscar</button>
        <a href="cadastroUnidades.html" class="btn btnPrimario" aria-label="Criar nova unidade escolar">
          + Nova Unidade
        </a>
      </div>

      <div class="filtrosUsuarios">
        <select id="filtroStatus" onchange="buscarUnidades()" aria-label="Filtrar por status">
          <option value="">Todos os Status</option>
          <option value="ativa">Ativa</option>
          <option value="inativa">Inativa</option>
          <option value="manutencao">Em Manutenção</option>
        </select>
      </div>
    </section>

    <!-- LISTA DE UNIDADES -->
    <section class="containerPrincipal">
      <div id="mensagemUnidades" class="alert d-none" role="alert" aria-live="polite"></div>
      <table class="tabelaResponsiva" id="tabelaUnidades">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Bairro</th>
            <th>CNPJ</th>
            <th>Diretor</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="unidadesTbody">
          <tr>
            <td colspan="6">Carregando unidades...</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <!-- MODAL DE CONFIRMAÇÃO DE EXCLUSÃO -->
  <div id="modalDelecao" class="modal">
    <div class="modalConteudo">
      <h2>Confirmar Exclusão</h2>
      <p>Tem certeza que deseja deletar esta unidade escolar? Esta ação não pode ser desfeita.</p>
      <div class="modalBotoes">
        <button class="btn btnSecundario btnFecharModal" onclick="fecharModal()">Cancelar</button>
        <button class="btn btnPerigo" onclick="executarDelecao()">Deletar</button>
      </div>
    </div>
  </div>

  <!-- VLIBRAS -->
  <div vw class="enabled">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
      <div class="vw-plugin-top-wrapper"></div>
    </div>
  </div>
  <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
  <script>
    new window.VLibras.Widget('https://vlibras.gov.br/app');
  </script>
  <script src="/scripts/apiClient.js"></script>

  <script>
    let idDelecao = null;
    let unidadesCache = [];

    function mostrarMensagem(tipo, texto) {
      const box = document.getElementById('mensagemUnidades');
      box.className = `alert alert-${tipo}`;
      box.textContent = texto;
      box.classList.remove('d-none');
    }

    function limparMensagem() {
      const box = document.getElementById('mensagemUnidades');
      box.classList.add('d-none');
      box.textContent = '';
    }

    function statusBadgeClass(status) {
      const nome = (status || '').toLowerCase();
      if (nome === 'ativa') return 'badgeSucesso';
      if (nome === 'inativa') return 'badgePerigo';
      return 'badgeAviso';
    }

    function renderUnidades() {
      const tbody = document.getElementById('unidadesTbody');

      if (unidadesCache.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6">Nenhuma unidade encontrada.</td></tr>';
        return;
      }

      tbody.innerHTML = unidadesCache.map((u) => `
        <tr>
          <td>${u.nome || '-'}</td>
          <td>${u.cidade || '-'}</td>
          <td>${u.cnpj || '-'}</td>
          <td>${u.diretor_nome || '-'}</td>
          <td><span class="badge ${statusBadgeClass(u.status)}">${u.status || '-'}</span></td>
          <td>
            <div class="acoes">
              <a href="atualizarUnidades.html?id=${u.id}" class="btn btnVer" style="padding: 6px 12px; font-size: 12px;">Ver</a>
              <a href="atualizarUnidades.html?id=${u.id}" class="btn btnEditar" style="padding: 6px 12px; font-size: 12px;">Editar</a>
              <button onclick="confirmarDelecao(${u.id})" class="btn btnDeletar" style="padding: 6px 12px; font-size: 12px;">Deletar</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function carregarUnidades() {
      limparMensagem();
      const busca = document.getElementById('campoBusca').value.trim();
      const status = document.getElementById('filtroStatus').value;
      const params = new URLSearchParams();
      if (busca) params.set('q', busca);
      if (status) params.set('status', status);

      const url = params.toString() ? `/api/admin/unidades?${params.toString()}` : '/api/admin/unidades';
      const response = await fetch(url);
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.message || 'Erro ao carregar unidades.');
      }

      const unidades = data.data && data.data.items ? data.data.items : (data.items || []);
      unidadesCache = unidades;
      renderUnidades();
    }

    async function buscarUnidades() {
      try {
        await carregarUnidades();
      } catch (error) {
        mostrarMensagem('danger', error.message || 'Erro ao buscar unidades.');
      }
    }

    function navegarPara(pagina) {
      window.location.href = pagina;
    }

    function logout() {
      if (confirm('Tem certeza que deseja sair do sistema?')) {
        fetch('/api/auth/logout', {
          method: 'POST'
        }).finally(() => {
          window.location.href = '/index.html';
        });
      }
    }

    function filtrarUnidades() { buscarUnidades(); }

    function confirmarDelecao(id) {
      idDelecao = id;
      document.getElementById('modalDelecao').classList.add('ativo');
    }

    function fecharModal() {
      document.getElementById('modalDelecao').classList.remove('ativo');
      idDelecao = null;
    }

    async function executarDelecao() {
      if (!idDelecao) return;

      try {
        const response = await fetch(`/api/admin/unidades/${idDelecao}`, {
          method: 'DELETE'
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.message || 'Erro ao excluir unidade.');
        }

        await buscarUnidades();
        mostrarMensagem('success', 'Unidade excluída com sucesso.');
      } catch (error) {
        mostrarMensagem('danger', error.message || 'Erro inesperado ao excluir unidade.');
      } finally {
        fecharModal();
      }
    }

    // Fechar modal ao clicar fora
    window.onclick = function(event) {
      const modal = document.getElementById('modalDelecao');
      if (event.target === modal) {
        fecharModal();
      }
    };

    (async function iniciarPagina() {
      try {
        await carregarUnidades();
      } catch (error) {
        mostrarMensagem('danger', error.message || 'Erro ao carregar dados da página.');
      }
    })();
  </script>
</body>
</html>
