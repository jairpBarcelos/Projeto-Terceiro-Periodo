<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atualizar Usuário - Administrador</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../../../../css/menuAdministrador.css">
  <link rel="stylesheet" href="../../../../css/administrador/usuarios.css">
</head>
<body>
  <!-- MENU LATERAL -->
  <aside class="menuLateral">
    <div class="logoContainer">
      <img src="/img/icons8-duas-mãos-windows-11-filled/Logo.png" alt="Logo: Duas Mãos abertas">
      <div class="textoBranding">
        <div class="nomeBrand">SAADI</div>
        <div class="nivelAcesso">Nível: Administrador</div>
      </div>
    </div>

    <div class="Perfil">
      <div class="nomePerfil"></div>
      <div class="emailPerfil"></div>
    </div>

                <div class="botoesLaterais">
      <button class="btnLateral" onclick="navegarPara('../menuAdministrador.html')" aria-label="Voltar ao Painel Principal">
        <img src="/img/icon-lista.png" alt="">
        <span>Painel Principal</span>
      </button>
      <button class="btnLateral" onclick="navegarPara('../unidades/listarUnidades.html')" aria-label="Gerenciar Unidades Escolares">
        <img src="/img/icon-cadastro.png" alt="">
        <span>Unidades Escolares</span>
      </button>
      <button class="btnLateral ativo" onclick="navegarPara('../usuarios/listarUsuarios.html')" aria-label="Gerenciar Usuários do Sistema">
        <img src="/img/perfil.png" alt="">
        <span>Usuários do Sistema</span>
      </button>
      <button class="btnLateral" onclick="navegarPara('../relatoriosAdministrador.html')" aria-label="Ver Relatórios Consolidados">
        <img src="/img/icon-lista.png" alt="">
        <span>Relatórios</span>
      </button>
      <button class="btnLateral" onclick="navegarPara('../auditoria.html')" aria-label="Consultar Auditoria e Histórico">
        <img src="/img/icon-lista.png" alt="">
        <span>Auditoria</span>
      </button>
      <button class="btnLateral" onclick="navegarPara('../parametros.html')" aria-label="Gerenciar Parâmetros do Sistema">
        <img src="/img/engrenagem.png" alt="">
        <span>Parâmetros</span>
      </button>
      <button class="btnLateral" onclick="navegarPara('../alunos/listarAlunos.html')" aria-label="Acessar Gestão Central de Alunos">
        <img src="/img/icon-lista.png" alt="">
        <span>Alunos - Nível Central</span>
      </button>
    </div>

    <div class="sair">
      <button class="btnSair" onclick="logout()" aria-label="Fazer logout do sistema">
        <img src="/img/sair.png" alt="">
        <span>Sair da Conta</span>
      </button>
    </div>
  </aside>

  <!-- CONTEÚDO PRINCIPAL -->
  <main class="conteudoPrincipal">
    <!-- CABEÇALHO -->
    <section class="cabecalhoDashboard">
      <h1>Atualizar Usuário</h1>
      <p>Modifique os dados de acesso e informações do usuário</p>
    </section>

    <!-- FORMULÁRIO DE ATUALIZAÇÃO -->
    <section class="containerPrincipal">
      <div id="mensagemAtualizarUsuario" class="alert d-none" role="alert" aria-live="polite"></div>
      <form class="formulario" onsubmit="salvarUsuario(event)" aria-label="Formulário de atualização de usuário">
        <!-- SEÇÃO 1: DADOS PESSOAIS -->
        <div style="grid-column: span 2; margin-bottom: 0;">
          <h3 style="color: #1a3a52; font-size: 16px; margin-bottom: 15px;">Dados Pessoais</h3>
        </div>

        <div class="grupoFormulario">
          <label for="nomeCompleto">Nome Completo *</label>
          <input type="text" id="nomeCompleto" name="nomeCompleto" value="" required aria-label="Nome completo do usuário">
        </div>

        <div class="grupoFormulario">
          <label for="cpf">CPF *</label>
          <input type="text" id="cpf" name="cpf" value="" required aria-label="CPF do usuário" disabled>
        </div>

        <div class="grupoFormulario">
          <label for="email">Email Institucional *</label>
          <input type="email" id="email" name="email" value="" required aria-label="Email institucional">
        </div>

        <div class="grupoFormulario">
          <label for="telefone">Telefone</label>
          <input type="tel" id="telefone" name="telefone" value="" aria-label="Telefone de contato">
        </div>

        <!-- SEÇÃO 2: DADOS DE ACESSO -->
        <div style="grid-column: span 2; margin-top: 25px; margin-bottom: 0;">
          <h3 style="color: #1a3a52; font-size: 16px; margin-bottom: 15px;">Dados de Acesso</h3>
        </div>

        <div class="grupoFormulario">
          <label for="usuario">Usuário/Matrícula *</label>
          <input type="text" id="usuario" name="usuario" value="" required aria-label="Nome de usuário ou matrícula">
        </div>

        <div class="grupoFormulario">
          <label for="novasenha">Nova Senha (deixe vazio para manter)</label>
          <input type="password" id="novasenha" name="novasenha" aria-label="Nova senha do usuário" placeholder="Mínimo 8 caracteres">
        </div>

        <div class="grupoFormulario">
          <label for="confirmaSenha">Confirmar Nova Senha</label>
          <input type="password" id="confirmaSenha" name="confirmaSenha" aria-label="Confirmação de nova senha" placeholder="Digite novamente">
        </div>

        <div class="grupoFormulario">
          <label for="perfil">Perfil de Acesso *</label>
          <select id="perfil" name="perfil" required aria-label="Perfil de acesso do usuário">
            <option value="2" selected>Secretaria</option>
            <option value="1">Administrador</option>
            <option value="3">Psicopedagogo</option>
            <option value="4">Professor</option>
            <option value="5">Diretor</option>
          </select>
        </div>

        <!-- SEÇÃO 3: VINCULAÇÃO -->
        <div style="grid-column: span 2; margin-top: 25px; margin-bottom: 0;">
          <h3 style="color: #1a3a52; font-size: 16px; margin-bottom: 15px;">Vinculação Organizacional</h3>
        </div>

        <div class="grupoFormulario">
          <label for="unidade">Unidade Escolar *</label>
          <select id="unidade" name="unidade" required aria-label="Unidade escolar">
            <option value="">Selecione uma unidade</option>
          </select>
        </div>

        <div class="grupoFormulario">
          <label for="departamento">Departamento</label>
          <select id="departamento" name="departamento" aria-label="Departamento">
            <option value="secretaria" selected>Secretaria</option>
            <option value="pedagogico">Pedagógico</option>
            <option value="administrativo">Administrativo</option>
          </select>
        </div>

        <!-- SEÇÃO 4: INFORMAÇÕES ADICIONAIS -->
        <div style="grid-column: span 2; margin-top: 25px; margin-bottom: 0;">
          <h3 style="color: #1a3a52; font-size: 16px; margin-bottom: 15px;">Informações Adicionais</h3>
        </div>

        <div class="grupoFormulario">
          <label for="status">Status *</label>
          <select id="status" name="status" required aria-label="Status do usuário">
            <option value="ativo" selected>Ativo</option>
            <option value="inativo">Inativo</option>
            <option value="bloqueado">Bloqueado</option>
          </select>
        </div>

        <div class="grupoFormulario">
          <label for="dataAdmissao">Data de Admissão</label>
          <input type="date" id="dataAdmissao" name="dataAdmissao" value="" aria-label="Data de admissão">
        </div>

        <div class="grupoFormulario" style="grid-column: span 2;">
          <label for="ultimoAcesso">Último Acesso</label>
          <input type="text" value="" disabled style="background: #f0f0f0; cursor: not-allowed;">
        </div>

        <div style="grid-column: span 2;">
          <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox" id="forcarMudancaSenha" name="forcarMudancaSenha" aria-label="Forçar mudança de senha no próximo login">
            <span style="color: #2c3e50; font-size: 14px;">Forçar mudança de senha no próximo login</span>
          </label>
        </div>

        <!-- BOTÕES -->
        <div class="botoesPrimarios" style="grid-column: span 2;">
          <a href="listarUsuarios.html" class="btn btnSecundario">Cancelar</a>
          <button type="button" class="btn btnPerigo" onclick="confirmarDelecao()">Deletar Usuário</button>
          <button type="submit" class="btn btnSucesso">Salvar Alterações</button>
        </div>
      </form>
    </section>
  </main>

  <!-- MODAL DE CONFIRMAÇÃO DE EXCLUSÃO -->
  <div id="modalDelecao" class="modal">
    <div class="modalConteudo">
      <h2>Confirmar Exclusão</h2>
      <p>Tem certeza que deseja deletar este usuário? Esta ação não pode ser desfeita.</p>
      <div class="modalBotoes">
        <button class="btn btnSecundario btnFecharModal" onclick="fecharModal()">Cancelar</button>
        <button class="btn btnPerigo" onclick="executarDelecao()">Deletar</button>
      </div>
    </div>
  </div>

  <script src="/scripts/apiClient.js"></script>

  <script>
    let usuarioId = null;

    // Decodifica JWT payload
    function decodificarTokenJWT(token) {
      if (!token) return null;
      try {
        const payloadBase64 = token.split('.')[1];
        if (!payloadBase64) return null;
        const base64Url = payloadBase64.replace(/-/g, '+').replace(/_/g, '/');
        const padding = '='.repeat((4 - (base64Url.length % 4)) % 4);
        const base64 = base64Url + padding;
        const json = atob(base64);
        return JSON.parse(json);
      } catch {
        return null;
      }
    }

    // Renderiza nome do perfil logado
    function renderizarPerfil() {
      const token = localStorage.getItem('saadi_access_token');
      const payload = decodificarTokenJWT(token);
      
      if (!payload) return;

      const nomePerfil = document.querySelector('.nomePerfil');
      const emailPerfil = document.querySelector('.emailPerfil');

      if (nomePerfil) {
        const nome = payload.nome || payload.user_name || '';
        const primeiroNome = nome.split(' ')[0];
        nomePerfil.textContent = primeiroNome ? `Olááá, ${primeiroNome}` : 'Olááá';
      }

      if (emailPerfil) {
        const email = payload.email || '';
        const perfil = payload.perfil || payload.profile_name || '';
        const texto = [email, perfil].filter(Boolean).join(' • ');
        emailPerfil.textContent = texto || 'Sessão ativa';
      }
    }

    // Wrapper removido. O apiClient.js intercepta nativamente as requisições fetch para anexar credentials e gerenciar tokens.

    function navegarPara(pagina) {
      window.location.href = pagina;
    }

    function mostrarMensagem(tipo, texto) {
      const box = document.getElementById('mensagemAtualizarUsuario');
      box.className = `alert alert-${tipo}`;
      box.textContent = texto;
      box.classList.remove('d-none');
    }

    function limparMensagem() {
      const box = document.getElementById('mensagemAtualizarUsuario');
      box.classList.add('d-none');
      box.textContent = '';
    }

    function obterUsuarioIdDaUrl() {
      const params = new URLSearchParams(window.location.search);
      const id = Number(params.get('id'));
      return Number.isFinite(id) && id > 0 ? id : null;
    }

    function preencherFormularioUsuario(usuario) {
      
      const setValor = (id, valor) => {
        const el = document.getElementById(id);
        if (el) {
          el.value = valor || '';
        } else {
          console.warn(`Elemento com ID "${id}" não encontrado no formulário de usuários.`);
        }
      };

      setValor('nomeCompleto', usuario.nome_completo);
      setValor('cpf', usuario.cpf);
      setValor('email', usuario.email);
      setValor('telefone', usuario.telefone);
      setValor('usuario', usuario.matricula);
      setValor('unidade', usuario.unidade_id ? String(usuario.unidade_id) : '');

      if (usuario.perfil_id) {
        setValor('perfil', String(usuario.perfil_id));
      }
      
      if (usuario.departamento) {
        setValor('departamento', usuario.departamento.toLowerCase());
      }

      if (usuario.status) {
        setValor('status', usuario.status.toLowerCase());
      }

      if (usuario.data_admissao) {
        const inputData = document.getElementById('dataAdmissao');
        if (inputData) {
          inputData.value = usuario.data_admissao.slice(0, 10);
        }
      }

      // Buscar campo de último acesso e preenchê-lo
      const ultimoAcessoInputs = document.querySelectorAll('input[type="text"][disabled]');
      for (const input of ultimoAcessoInputs) {
        if (input.previousElementSibling && input.previousElementSibling.textContent.includes('Último Acesso')) {
          input.value = usuario.ultimo_login_em
            ? new Date(usuario.ultimo_login_em).toLocaleString('pt-BR')
            : 'Nunca acessou';
          break;
        }
      }
    }

    async function carregarUnidades(unidadeSelecionada) {
      const select = document.getElementById('unidade');
      try {
        const response = await fetch('/api/admin/unidades');
        const data = await response.json();

        if (!response.ok) {
          console.error('Erro ao buscar unidades:', data.message);
          return;
        }

        select.innerHTML = '<option value="">Selecione...</option>';
        const unidades = data.data?.items || data.items || [];
        for (const unidade of unidades) {
          const option = document.createElement('option');
          option.value = String(unidade.id);
          option.textContent = unidade.nome;
          select.appendChild(option);
        }

        if (unidadeSelecionada) {
          select.value = String(unidadeSelecionada);
        }
      } catch (err) {
        console.error('Erro de rede ao carregar unidades:', err);
      }
    }

    async function carregarUsuario() {
      limparMensagem();

      try {
        const response = await fetch(`/api/admin/usuarios/${usuarioId}`);
        const jsonData = await response.json();
        

        if (!response.ok) {
          throw new Error(jsonData.message || 'Erro ao carregar usuário do servidor.');
        }

        const usuarioData = jsonData.data?.item || jsonData.data || jsonData.item || jsonData;
        
        
        // Carrega as unidades primeiro, mas não deixa falhar o carregamento do usuário
        await carregarUnidades(usuarioData.unidade_id).catch(e => console.error(e));
        
        preencherFormularioUsuario(usuarioData);
      } catch (error) {
        console.error('Erro na requisição de carregamento:', error);
        mostrarMensagem('danger', 'Não foi possível carregar os dados: ' + error.message);
      }
    }

    function logout() {
      if (confirm('Tem certeza que deseja sair do sistema?')) {
        fetch('/api/auth/logout', {
          method: 'POST'
        }).finally(() => {
          window.location.href = '/index.html';
        });
      }
    }

    async function salvarUsuario(event) {
      event.preventDefault();
      limparMensagem();

      const novaSenha = document.getElementById('novasenha').value;
      const confirmaSenha = document.getElementById('confirmaSenha').value;

      if (novaSenha && novaSenha !== confirmaSenha) {
        mostrarMensagem('danger', 'As senhas não coincidem.');
        return;
      }

      if (novaSenha && novaSenha.length < 8) {
        mostrarMensagem('danger', 'A senha deve ter no mínimo 8 caracteres.');
        return;
      }

      const payload = {
        unidade_id: Number(document.getElementById('unidade').value),
        perfil_id: Number(document.getElementById('perfil').value),
        nome_completo: document.getElementById('nomeCompleto').value.trim(),
        cpf: document.getElementById('cpf').value.trim(),
        email: document.getElementById('email').value.trim(),
        telefone: document.getElementById('telefone').value.trim(),
        matricula: document.getElementById('usuario').value.trim(),
        departamento: document.getElementById('departamento').value || null,
        status: document.getElementById('status').value,
        data_admissao: document.getElementById('dataAdmissao').value || null,
        enviar_email_boas_vindas: true,
      };

      if (novaSenha) {
        payload.senha = novaSenha;
      }

      try {
        const response = await fetch(`/api/admin/usuarios/${usuarioId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
          },
          body: JSON.stringify(payload),
        });

        const data = await response.json();
        if (!response.ok) {
          let msg = data.message || 'Erro ao atualizar usuário.';
          const errorDetails = data.error?.details || data.details;
          if (errorDetails && Array.isArray(errorDetails)) {
            const detalhes = errorDetails.map(d => `${d.loc.join('.')}: ${d.msg}`).join(' | ');
            msg += ` (${detalhes})`;
          } else if (errorDetails) {
            msg += ` (${JSON.stringify(errorDetails)})`;
          } else if (data.error?.code) {
            msg += ` [${data.error.code}]`;
          }
          throw new Error(msg);
        }

        mostrarMensagem('success', 'Usuário atualizado com sucesso.');
        setTimeout(() => {
          window.location.href = 'listarUsuarios.html';
        }, 700);
      } catch (error) {
        mostrarMensagem('danger', error.message || 'Erro inesperado ao atualizar usuário.');
      }
    }

    function confirmarDelecao() {
      document.getElementById('modalDelecao').classList.add('ativo');
    }

    function fecharModal() {
      document.getElementById('modalDelecao').classList.remove('ativo');
    }

    async function executarDelecao() {
      if (!usuarioId) return;

      try {
        const response = await fetch(`/api/admin/usuarios/${usuarioId}`, {
          method: 'DELETE'
        });
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Erro ao deletar usuário.');
        }

        mostrarMensagem('success', 'Usuário deletado com sucesso.');
        setTimeout(() => {
          window.location.href = 'listarUsuarios.html';
        }, 600);
      } catch (error) {
        mostrarMensagem('danger', error.message || 'Erro inesperado ao deletar usuário.');
      } finally {
        fecharModal();
      }
    }

    window.onclick = function(event) {
      const modal = document.getElementById('modalDelecao');
      if (event.target === modal) {
        fecharModal();
      }
    };

    (async function iniciarPagina() {
      renderizarPerfil();
      usuarioId = obterUsuarioIdDaUrl();

      if (!usuarioId) {
        mostrarMensagem('danger', 'ID de usuário inválido na URL.');
        return;
      }

      try {
        await carregarUsuario();
      } catch (error) {
        mostrarMensagem('danger', error.message || 'Erro ao carregar dados do usuário.');
      }
    })();
  </script>
</body>
</html>
